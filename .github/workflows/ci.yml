name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    # MVP A8: green on >=1 OS. The 3-OS matrix (windows/macos), gallery artifact,
    # and visual-regression gates are added in Phase 3.
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up Node (ELK layout runs in a Node subprocess - ADR-002)
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Install package + dev tooling
        run: python -m pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Type check (mypy)
        run: mypy

      - name: Test (pytest)
        run: pytest

      - name: Build sdist + wheel
        run: python -m build

      # Phase 2 adds: `playwright install chromium`, `tarseem doctor`, render-golden + e2e suites,
      #               and coverage >= 80% gating.
      # Phase 3 adds: 3-OS matrix, gallery artifact upload, and screenshot regression gates.
