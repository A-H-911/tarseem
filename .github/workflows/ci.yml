name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    # MVP A8: full suite green across Windows, macOS, and Linux x Python 3.10/3.12.
    # The visual-regression baselines are OS-specific (tests/baselines/<platform>/); committed
    # for win32 + linux + darwin, so the comparison runs on each matrix OS (it skips a platform
    # only if its baseline dir is ever missing). Regenerate via the baselines.yml workflow.
    name: ${{ matrix.os }} / py${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up Node (ELK layout runs in a Node subprocess - ADR-002)
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Install package + dev tooling
        run: python -m pip install -e ".[dev]"

      - name: Install Playwright Chromium (rendering + E2E)
        run: python -m playwright install --with-deps chromium

      - name: Lint (ruff)
        run: ruff check .

      - name: Type check (mypy)
        run: mypy

      - name: Engine doctor (A11 - Node/elkjs/Chromium/fonts)
        run: tarseem doctor

      - name: Test (pytest - schema/unit/contract/render/E2E/visual) + coverage gate
        run: pytest --cov=tarseem --cov-report=term-missing --cov-fail-under=80

      - name: Build the gallery (A6/A9)
        run: tarseem gallery --examples examples -o build/gallery --no-png

      - name: Build sdist + wheel
        run: python -m build

      - name: Upload gallery artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gallery-${{ matrix.os }}-py${{ matrix.python-version }}
          path: build/gallery
          if-no-files-found: ignore
